<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bg1" cx="25%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="28"/>
      <feOffset dx="0" dy="50"/>
      <feComposite in2="SourceGraphic" operator="out"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#070a0e"/>
    </linearGradient>
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <!-- floor reflection gradient -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur20">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="1280" height="720" fill="#041318"/>

  <!-- Gradient blobs -->
  <rect width="1280" height="720" fill="url(#bg3)"/>
  <rect width="1280" height="720" fill="url(#bg1)" opacity="0.85"/>
  <rect width="1280" height="720" fill="url(#bg2)" opacity="0.7"/>

  <!-- Floor plane highlight -->
  <ellipse cx="640" cy="660" rx="600" ry="80" fill="url(#floorGrad)" filter="url(#blur8)"/>

  <!-- Card shadow on floor -->
  <ellipse cx="628" cy="645" rx="240" ry="28" fill="rgba(0,0,0,0.45)" filter="url(#blur20)"/>

  <!-- Card group: slightly tilted -->
  <g transform="translate(640,348) rotate(-4)">
    <!-- Card body -->
    <rect x="-248" y="-172" width="496" height="344" rx="42" ry="42" fill="url(#cardGrad)"/>
    <!-- Top edge highlight (glass rim) -->
    <rect x="-248" y="-172" width="496" height="344" rx="42" ry="42" fill="url(#edgeHighlight)"/>
    <!-- Subtle inner border -->
    <rect x="-247" y="-171" width="494" height="342" rx="41" ry="41" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  </g>
</svg>
