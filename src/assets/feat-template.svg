<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <radialGradient id="blbg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="55%" stop-color="#1e1b8a"/>
      <stop offset="100%" stop-color="#06052e"/>
    </radialGradient>
    <radialGradient id="blspot" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(129,140,248,0.30)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="bookshadow" x="-30%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30"/>
      <feOffset dx="0" dy="50"/>
      <feFlood flood-color="rgba(0,0,0,0.55)"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur16"><feGaussianBlur stdDeviation="16"/></filter>
    <linearGradient id="leftPage" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1020"/>
      <stop offset="100%" stop-color="#1a1c35"/>
    </linearGradient>
    <linearGradient id="rightPage" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e8edf5"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0b18"/>
      <stop offset="100%" stop-color="#1a1c35"/>
    </linearGradient>
    <linearGradient id="coverSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="960" fill="url(#blbg)"/>
  <rect width="1440" height="960" fill="url(#blspot)"/>

  <!-- Floor shadow -->
  <ellipse cx="720" cy="870" rx="500" ry="45" fill="rgba(0,0,0,0.40)" filter="url(#blur16)"/>

  <!-- Book group: open book in perspective, tilted -->
  <g transform="translate(720,468) rotate(-3)" filter="url(#bookshadow)">

    <!-- Book shadow/depth bottom edge -->
    <rect x="-430" y="262" width="860" height="18" rx="4" fill="rgba(0,0,0,0.35)"/>

    <!-- LEFT PAGE (dark / cover side) -->
    <g>
      <!-- Page shape in slight perspective -->
      <path d="M -428,-268 L -12,-240 L -12,262 L -428,268 Z" fill="url(#leftPage)"/>
      <path d="M -428,-268 L -12,-240 L -12,262 L -428,268 Z" fill="url(#coverSheen)"/>

      <!-- Left page content: UI panel mockup -->
      <g clip-path="url(#leftClip)">
        <!-- Dark card in left page center -->
        <rect x="-360" y="-170" width="320" height="200" rx="10" fill="rgba(15,20,50,0.8)" stroke="rgba(129,140,248,0.3)" stroke-width="1.5"/>
        <!-- Card title row -->
        <rect x="-340" y="-150" width="140" height="10" rx="5" fill="rgba(129,140,248,0.7)"/>
        <!-- Card subtitle -->
        <rect x="-340" y="-132" width="100" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
        <!-- Divider -->
        <line x1="-340" y1="-115" x2="-60" y2="-115" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <!-- Lines -->
        <rect x="-340" y="-100" width="258" height="7" rx="3.5" fill="rgba(255,255,255,0.15)"/>
        <rect x="-340" y="-87" width="230" height="7" rx="3.5" fill="rgba(255,255,255,0.11)"/>
        <rect x="-340" y="-74" width="245" height="7" rx="3.5" fill="rgba(255,255,255,0.11)"/>
        <rect x="-340" y="-61" width="200" height="7" rx="3.5" fill="rgba(255,255,255,0.09)"/>
        <!-- Check icon -->
        <circle cx="-52" cy="-150" r="10" fill="rgba(129,140,248,0.4)"/>
        <text x="-57" y="-145" font-size="11" fill="rgba(255,255,255,0.9)" font-family="sans-serif">✓</text>
      </g>

      <!-- Body text lines on left page -->
      <rect x="-390" y="50" width="355" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="-390" y="66" width="340" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
      <rect x="-390" y="82" width="360" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
      <rect x="-390" y="98" width="310" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
      <rect x="-390" y="114" width="345" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>

      <!-- Page number -->
      <text x="-390" y="248" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.2)">Author: ReportFlow</text>
      <text x="-60" y="248" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.2)">1</text>
    </g>

    <!-- SPINE -->
    <rect x="-14" y="-240" width="28" height="502" fill="url(#spine)"/>
    <rect x="-14" y="-240" width="28" height="502" fill="rgba(0,0,0,0.3)"/>

    <!-- RIGHT PAGE (white / content) -->
    <g>
      <path d="M 12,-240 L 430,-268 L 430,268 L 12,262 Z" fill="url(#rightPage)"/>

      <!-- Content on right page -->
      <!-- Title block -->
      <rect x="30" y="-215" width="190" height="14" rx="7" fill="#1e1b4b"/>
      <!-- Subtitle -->
      <rect x="30" y="-194" width="140" height="9" rx="4.5" fill="#6366f1" opacity="0.7"/>
      <!-- Divider -->
      <line x1="30" y1="-176" x2="400" y2="-176" stroke="#cbd5e1" stroke-width="1"/>

      <!-- Body paragraph 1 -->
      <rect x="30" y="-162" width="368" height="7" rx="3.5" fill="#475569"/>
      <rect x="30" y="-149" width="350" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="-136" width="365" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="-123" width="320" height="7" rx="3.5" fill="#94a3b8"/>

      <!-- Paragraph 2 -->
      <rect x="30" y="-100" width="362" height="7" rx="3.5" fill="#475569"/>
      <rect x="30" y="-87" width="340" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="-74" width="370" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="-61" width="345" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="-48" width="290" height="7" rx="3.5" fill="#94a3b8"/>

      <!-- Section heading -->
      <rect x="30" y="-24" width="130" height="11" rx="5.5" fill="#1e293b"/>

      <!-- Paragraph 3 -->
      <rect x="30" y="-6" width="368" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="7" width="355" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="20" width="362" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="33" width="310" height="7" rx="3.5" fill="#cbd5e1"/>

      <!-- Section heading 2 -->
      <rect x="30" y="55" width="80" height="11" rx="5.5" fill="#1e293b"/>

      <!-- Paragraph 4 -->
      <rect x="30" y="72" width="365" height="7" rx="3.5" fill="#64748b"/>
      <rect x="30" y="85" width="340" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="98" width="358" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="111" width="300" height="7" rx="3.5" fill="#cbd5e1"/>
      <rect x="30" y="124" width="350" height="7" rx="3.5" fill="#cbd5e1"/>
      <rect x="30" y="137" width="320" height="7" rx="3.5" fill="#e2e8f0"/>

      <!-- Notes section -->
      <rect x="30" y="158" width="90" height="10" rx="5" fill="#1e293b"/>
      <rect x="30" y="174" width="368" height="7" rx="3.5" fill="#94a3b8"/>
      <rect x="30" y="187" width="340" height="7" rx="3.5" fill="#cbd5e1"/>
      <rect x="30" y="200" width="290" height="7" rx="3.5" fill="#e2e8f0"/>

      <!-- Page footer -->
      <line x1="30" y1="228" x2="400" y2="228" stroke="#e2e8f0" stroke-width="1"/>
      <text x="30" y="248" font-family="Georgia, serif" font-size="11" fill="#94a3b8">IEEE Format · ReportFlow</text>
      <text x="388" y="248" font-family="Georgia, serif" font-size="11" fill="#94a3b8">3</text>
    </g>
  </g>
</svg>
